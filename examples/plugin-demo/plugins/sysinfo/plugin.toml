name        = "sysinfo"
version     = "0.2.0"
author      = "meh2 examples"
description = "CPU and RAM stats from /proc, plus a ready-made sysinfo-pill widget."

[[vars]]
name     = "PLUGIN_CPU"
type     = "poll"
interval = 2
initial  = "0%"

[[vars]]
name     = "PLUGIN_RAM"
type     = "poll"
interval = 5
initial  = "0 MB"

# ── Widget exports ────────────────────────────────────────────────────────────
# Once loaded, `(sysinfo-pill)` is available in any yuck config.
# The widget rebuilds automatically when PLUGIN_CPU or PLUGIN_RAM change.
# Call-site override: `(sysinfo-pill :watch "PLUGIN_CPU")` to watch only CPU.
[[widgets]]
name          = "sysinfo-pill"
fn_name       = "render_sysinfo_pill"
default_watch = ["PLUGIN_CPU", "PLUGIN_RAM"]

[permissions]
read_files  = ["/proc/stat", "/proc/meminfo"]
allow_shell = false
write_cache = true
