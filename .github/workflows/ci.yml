name: CI

on:
  push:
    branches: [master, main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:/usr/local/lib/x86_64-linux-gnu/pkgconfig

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential meson ninja-build \
            libgtk-4-dev libadwaita-1-dev libglib2.0-dev \
            libwayland-dev wayland-protocols \
            libegl-dev libgles-dev libdbus-1-dev

      - name: Build and install gtk4-layer-shell
        run: |
          git clone --depth=1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gtk4-layer-shell
          meson setup --prefix=/usr/local \
            -Dintrospection=false -Dvapi=false -Ddocs=false -Dtests=false -Dexamples=false \
            /tmp/gtk4-layer-shell /tmp/gtk4-layer-shell-build
          ninja -C /tmp/gtk4-layer-shell-build
          sudo ninja -C /tmp/gtk4-layer-shell-build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test (default features)
        run: cargo test --workspace --locked

      - name: cargo test (minimal)
        run: cargo test -p meh2 --no-default-features --features minimal --locked

      - name: clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings
