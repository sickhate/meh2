name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  clippy:
    name: Clippy & fmt
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential cmake meson ninja-build \
            libgtk-4-dev libglib2.0-dev \
            libwayland-dev libxkbcommon-dev \
            libgdk-pixbuf2.0-dev libadwaita-1-dev

      - name: Build & install gtk4-layer-shell
        run: |
          git clone --depth=1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gls
          meson setup --prefix=/usr/local -Dintrospection=false -Dvapi=false /tmp/gls /tmp/gls-build
          ninja -C /tmp/gls-build
          sudo ninja -C /tmp/gls-build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-clippy-

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace -- -D warnings
      - run: cargo clippy --workspace --no-default-features -- -D warnings
      - run: cargo test --workspace
      - run: cargo test --workspace --no-default-features

  build:
    name: Build (${{ matrix.profile }})
    runs-on: ubuntu-24.04
    needs: clippy
    strategy:
      fail-fast: false
      matrix:
        include:
          - profile: minimal
            flags: --no-default-features --features minimal
          - profile: default
            flags: ""
          - profile: full
            flags: --features full

    steps:
      - uses: actions/checkout@v4

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config build-essential cmake meson ninja-build \
            libgtk-4-dev libglib2.0-dev \
            libwayland-dev libxkbcommon-dev \
            libgdk-pixbuf2.0-dev libadwaita-1-dev

      - name: Build & install gtk4-layer-shell
        run: |
          git clone --depth=1 https://github.com/wmww/gtk4-layer-shell.git /tmp/gls
          meson setup --prefix=/usr/local -Dintrospection=false -Dvapi=false /tmp/gls /tmp/gls-build
          ninja -C /tmp/gls-build
          sudo ninja -C /tmp/gls-build install
          sudo ldconfig

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-build-${{ matrix.profile }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-build-${{ matrix.profile }}-

      - name: Build ${{ matrix.profile }}
        run: cargo build --release ${{ matrix.flags }}

      - name: Binary size
        run: |
          size=$(stat -c%s target/release/meh2)
          echo "Binary: $(( size / 1024 / 1024 )) MiB (${size} bytes)"
          # Enforce budget: minimal < 5 MiB, default/full < 12 MiB
          if [[ "${{ matrix.profile }}" == "minimal" && $size -gt $((5 * 1024 * 1024)) ]]; then
            echo "::error::minimal binary exceeds 5 MiB budget"
            exit 1
          fi
          if [[ $size -gt $((12 * 1024 * 1024)) ]]; then
            echo "::error::binary exceeds 12 MiB budget"
            exit 1
          fi
